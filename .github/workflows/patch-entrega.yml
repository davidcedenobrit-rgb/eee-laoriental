name: Aplicar ajustes al formato de entrega

on:
  push:
    paths:
      - '.github/workflows/patch-entrega.yml'

permissions:
  contents: write

jobs:
  actualizar-entrega:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Actualizar nombre y encabezado
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('entrega.html')
          content = path.read_text(encoding='utf-8')

          replacements = {
              'Eloina Flores': 'Jonahta Leon',
              'Pierre El Kareh': 'Jonahta Leon',
              '05 · MG ZS New · Ficha de referencia': '05 · MG ZS New',
          }

          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f'No se encontró el texto esperado: {old}')
              content = content.replace(old, new)

          path.write_text(content, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entrega.html
          git commit -m "fix: actualizar cliente y encabezado de entrega"
          git push origin HEAD:main
