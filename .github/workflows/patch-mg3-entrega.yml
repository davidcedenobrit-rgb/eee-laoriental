# Activación del ajuste solicitado
name: Actualizar vehículo de entrega a MG 3 New

on:
  push:
    paths:
      - '.github/workflows/patch-mg3-entrega.yml'

permissions:
  contents: write

jobs:
  actualizar-entrega:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Actualizar vehículo entregado
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('entrega.html')
          content = path.read_text(encoding='utf-8')

          old_img = 'https://assets.cdn.filesafe.space/XZDJ4aSOAL1crWRCXyY6/media/69986679f83453f1b67b125c.png'
          new_img = 'https://assets.cdn.filesafe.space/XZDJ4aSOAL1crWRCXyY6/media/6998655808245e7a96fd8a2d.png'

          required = [
              old_img,
              '<span id="modelo-display">Modelo no seleccionado</span>',
              '<span id="brand-badge" style="display:none">MG</span>',
              '<option>MG3 1.5L MT STD</option>',
              '<!-- ─ 5. MG ZS New ─ -->',
          ]
          for item in required:
              if item not in content:
                  raise SystemExit(f'No se encontró el texto esperado: {item}')

          content = content.replace(old_img, new_img)
          content = content.replace('alt="MG ZS"', 'alt="MG 3 New"')
          content = content.replace(
              '<span id="modelo-display">Modelo no seleccionado</span>',
              '<span id="modelo-display">MG 3 New Sincrónico</span>',
              1,
          )
          content = content.replace(
              '<span id="brand-badge" style="display:none">MG</span>',
              '<span id="brand-badge" style="display:inline">MG</span>',
              1,
          )
          content = content.replace('<option>MG</option>', '<option selected>MG</option>', 1)
          content = content.replace(
              '<option>MG3 1.5L MT STD</option>',
              '<option selected>MG 3 New Sincrónico</option>',
              1,
          )

          new_section = '''  <!-- ─ 5. MG 3 New Sincrónico ─ -->
  <div class="section">
    <div class="section-title">05 · MG 3 New Sincrónico</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <img src="https://assets.cdn.filesafe.space/XZDJ4aSOAL1crWRCXyY6/media/6998655808245e7a96fd8a2d.png"
           alt="MG 3 New" style="width:180px;height:100px;object-fit:cover;border-radius:10px;border:1px solid rgba(217,28,36,0.2)"
           onerror="this.style.display='none'" />
      <div>
        <p style="font-size:16px;font-weight:800;color:#fff;margin-bottom:4px">MG 3 New · Sincrónico</p>
        <p style="font-size:12px;color:#94a3b8;line-height:1.5;max-width:480px">
          Hatchback compacto de nueva generación, con diseño moderno, transmisión manual y una
          configuración práctica para la conducción urbana, familiar y cotidiana.
        </p>
      </div>
    </div>
    <div class="zs-grid">
      <div class="zs-feat">
        <div class="zs-feat-icon">🏎️</div>
        <div class="zs-feat-name">Motor 1.5L</div>
        <div class="zs-feat-desc">Respuesta equilibrada para recorridos urbanos y conducción en carretera.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">⚙️</div>
        <div class="zs-feat-name">Transmisión sincrónica</div>
        <div class="zs-feat-desc">Caja manual para una conducción ágil y mayor control del vehículo.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">🚘</div>
        <div class="zs-feat-name">Diseño hatchback</div>
        <div class="zs-feat-desc">Estilo moderno, compacto y funcional para el uso diario.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">📱</div>
        <div class="zs-feat-name">Conectividad</div>
        <div class="zs-feat-desc">Sistema multimedia y funciones de conectividad según equipamiento.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">🛡️</div>
        <div class="zs-feat-name">Seguridad</div>
        <div class="zs-feat-desc">Sistemas de seguridad activa y pasiva para una conducción confiable.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">⛽</div>
        <div class="zs-feat-name">Eficiencia</div>
        <div class="zs-feat-desc">Configuración orientada a un consumo equilibrado y práctico.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">💺</div>
        <div class="zs-feat-name">Comodidad interior</div>
        <div class="zs-feat-desc">Cabina versátil y confortable para conductor y pasajeros.</div>
      </div>
      <div class="zs-feat">
        <div class="zs-feat-icon">🔒</div>
        <div class="zs-feat-name">Garantía de fábrica</div>
        <div class="zs-feat-desc">Cobertura según las condiciones y el plan de mantenimiento vigente.</div>
      </div>
    </div>
  </div>

  <!-- ─ 6. Observaciones ─ -->'''

          pattern = r'  <!-- ─ 5\. MG ZS New ─ -->.*?  <!-- ─ 6\. Observaciones ─ -->'
          content, count = re.subn(pattern, new_section, content, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'No se pudo reemplazar la sección del vehículo. Coincidencias: {count}')

          path.write_text(content, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entrega.html
          git commit -m "fix: cambiar vehículo entregado a MG 3 New Sincrónico"
          git push origin HEAD:main
